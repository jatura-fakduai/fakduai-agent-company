<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinto Valley Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2d3646;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;color:#e0e0e0}

/* Header */
#header{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(180deg,#111936,#0f0f1e);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:100}
#header h1{font-size:14px;font-weight:700;color:#fff;white-space:nowrap}
#stats{display:flex;gap:6px;flex:1;justify-content:center;flex-wrap:wrap}
.sp{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent}
.sp-w{background:rgba(30,136,229,.15);border-color:rgba(30,136,229,.3);color:#64b5f6}
.sp-i{background:rgba(67,160,71,.15);border-color:rgba(67,160,71,.3);color:#81c784}
.sp-b{background:rgba(229,57,53,.15);border-color:rgba(229,57,53,.3);color:#e57373}
.sp-d{background:rgba(0,137,123,.15);border-color:rgba(0,137,123,.3);color:#80cbc4}
.sp-o{background:rgba(100,100,100,.15);border-color:rgba(100,100,100,.3);color:#9e9e9e}
#hdr-r{display:flex;align-items:center;gap:8px}
#live{font-size:11px;color:#4CAF50;font-weight:600}
.hbtn{border:none;padding:5px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
#btn-work{background:#1e88e5;color:#fff}
#btn-work:hover{background:#1976d2}
#btn-meet{background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.36);color:#e9d5ff}
#btn-meet.on{background:#7c3aed;color:#fff;border-color:#a78bfa}
#btn-fit{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#ccc}
#btn-fit:hover{background:rgba(255,255,255,.12);color:#fff}

/* Canvas */
#game{display:none;position:fixed;top:56px;left:0;cursor:grab;background:#383d49}
#game:active{cursor:grabbing}
#stage{position:fixed;top:56px;left:0;right:310px;bottom:0;overflow:hidden;background:#383d49}
body.wide #stage{right:0}
#stage-map{position:absolute;left:50%;top:50%;width:100%;height:100%;max-width:calc((100vh - 56px) * 1.5);max-height:calc((100vw - 310px) / 1.5);transform:translate(-50%,-50%);transform-origin:50% 50%;transition:transform .55s cubic-bezier(.2,.8,.25,1),transform-origin .55s cubic-bezier(.2,.8,.25,1);aspect-ratio:3/2}
body.wide #stage-map{max-height:calc(100vw / 1.5)}
#office-img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;filter:saturate(1.04) contrast(1.03);transform:none}
#office-sign{position:absolute;left:15.15%;top:46%;width:9.6%;height:4.7%;display:flex;align-items:center;justify-content:center;padding:.22% .42%;background:linear-gradient(180deg,#18385c,#081522 72%,#040d17);border:1px solid rgba(126,203,255,.66);box-shadow:inset 0 0 0 1px rgba(255,255,255,.1),inset 0 -7px 14px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.42);color:#dff7ff;font-size:clamp(7px,.76vw,12px);font-weight:900;letter-spacing:.28px;text-transform:uppercase;text-shadow:0 0 8px rgba(80,190,255,.75);transform:rotateZ(-11.8deg) skewX(-4.4deg) perspective(180px) rotateY(-3deg);transform-origin:82% 50%;border-radius:2px;pointer-events:none;z-index:2}
#meeting-status-board{position:absolute;left:42%;top:8.5%;width:10.5%;height:6.5%;display:flex;flex-direction:column;justify-content:center;gap:2.5%;padding:.35% .5%;background:linear-gradient(180deg,#09233b,#07111e 70%,#030912);border:1px solid rgba(122,205,255,.5);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),inset 0 -8px 14px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.38);color:#dff7ff;transform:rotateZ(-11.8deg) skewX(-4.4deg) perspective(180px) rotateY(-3deg);transform-origin:50% 50%;border-radius:2px;pointer-events:none;z-index:2;overflow:hidden}
#meeting-status-board .msbtop{display:flex;align-items:flex-end;justify-content:space-between;gap:5px;min-width:0}
#meeting-status-board .msblabel{font-size:clamp(5px,.48vw,8px);font-weight:900;color:#7dd3fc;text-transform:uppercase;letter-spacing:0}
#meeting-status-board .msbpct{font-size:clamp(8px,1.12vw,17px);line-height:.95;font-weight:950;color:#f8feff;text-shadow:0 0 8px rgba(80,200,255,.86);white-space:nowrap}
#meeting-status-board .msbtrack{height:12%;min-height:2px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden;box-shadow:inset 0 0 4px rgba(0,0,0,.38)}
#meeting-status-board .msbbar{display:block;height:100%;width:0;background:linear-gradient(90deg,#22c55e,#67e8f9);border-radius:inherit;box-shadow:0 0 7px rgba(103,232,249,.62);transition:width .35s ease}
#meeting-status-board .msbtopic{font-size:clamp(5px,.56vw,9px);line-height:1.08;font-weight:800;color:#e7faff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0}
#meeting-status-board .msbtopic:before{content:"TOPIC ";color:#7dd3fc;font-weight:950}
#meeting-glow{display:none}
#meeting-glow.on{display:none}
#agent-layer{position:absolute;inset:0;pointer-events:none;z-index:3}
#desk-occlusion-layer{position:absolute;inset:0;pointer-events:none;z-index:4}
#chat-feed{position:fixed;left:12px;bottom:304px;z-index:48;width:240px;max-height:300px;background:rgba(10,15,28,.78);border:1px solid rgba(255,255,255,.1);border-radius:7px;box-shadow:0 6px 20px rgba(0,0,0,.3);backdrop-filter:blur(7px);overflow:hidden;pointer-events:auto}
#chat-feed .chh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.07);font-size:9px;color:#8b949e;font-weight:900;text-transform:uppercase;letter-spacing:.55px}
#chat-feed .cht{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#chat-feed .chact{display:flex;align-items:center;gap:6px}
#chat-feed .chlive{color:#7ee787;font-size:8px;letter-spacing:0;text-transform:none}
#chat-feed .chmin{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#9ca3af;border-radius:5px;width:18px;height:18px;line-height:14px;font-size:12px;cursor:pointer;padding:0}
#chat-feed .chbody{max-height:258px;overflow-y:auto;overflow-x:hidden}
#chat-feed .chbody::-webkit-scrollbar{width:4px}
#chat-feed .chbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:4px}
#chat-feed .chr{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
#chat-feed .chr:last-child{border-bottom:none}
#chat-feed .chmeta{display:flex;align-items:center;gap:6px;margin-bottom:2px;font-size:9px;color:#8b949e}
#chat-feed .route{color:#79c0ff;font-weight:800}
#chat-feed .chtime{margin-left:auto;color:#6e7681;white-space:nowrap}
#chat-feed .chtext{font-size:10px;line-height:1.3;color:#dbe7f3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
#chat-feed.empty{display:none}
#chat-feed.min{width:240px;max-height:29px}
#chat-feed.min .chbody{display:none}
#token-card{position:fixed;left:12px;bottom:120px;z-index:48;width:240px;min-height:156px;max-height:174px;background:rgba(10,15,28,.82);border:1px solid rgba(255,255,255,.1);border-radius:7px;box-shadow:0 6px 20px rgba(0,0,0,.3);backdrop-filter:blur(7px);overflow:hidden;pointer-events:auto;color:#dbe7f3;cursor:pointer}
#token-card.empty{display:none}
#token-card .tch{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.07)}
#token-card .tct{font-size:9px;color:#8b949e;font-weight:900;text-transform:uppercase;letter-spacing:.55px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#token-card .tcact{display:flex;align-items:center;gap:6px}
#token-card .tctotal{font-size:11px;color:#f0f6fc;font-weight:900;white-space:nowrap}
#token-card .tcbody{padding:6px 8px;display:grid;gap:5px;max-height:142px;overflow-y:auto}
#token-card .tcbody::-webkit-scrollbar{width:4px}
#token-card .tcbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:4px}
#token-card .tcmodels{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
#token-card .tcmodels::-webkit-scrollbar{display:none}
#token-card .tcmodel{border:1px solid rgba(121,192,255,.22);background:rgba(121,192,255,.08);color:#9dccff;border-radius:6px;padding:3px 6px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap}
#token-card .tcmodel.on{border-color:rgba(126,231,135,.44);background:rgba(126,231,135,.14);color:#b9f6ca}
#token-card .tcchart{display:grid;grid-template-columns:74px 1fr;gap:7px;align-items:center;min-height:98px}
#token-card .tcdonut{width:74px;height:74px;border-radius:50%;background:var(--chart,conic-gradient(#58a6ff 0 100%));position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 0 18px rgba(88,166,255,.12)}
#token-card .tcdonut:after{content:"";position:absolute;inset:14px;border-radius:50%;background:rgba(10,15,28,.96);box-shadow:inset 0 0 0 1px rgba(255,255,255,.07)}
#token-card .tcdonut span{position:absolute;inset:0;display:grid;place-items:center;z-index:1;font-size:13px;font-weight:950;color:#f0f6fc}
#token-card .tclegend{display:grid;gap:4px;min-width:0}
#token-card .tcrow{display:grid;grid-template-columns:minmax(58px,1fr) 46px;gap:4px 6px;align-items:center;min-width:0}
#token-card .tcrow:nth-child(n+5){display:none}
#token-card .tcagent{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#dbe7f3;font-size:10px;font-weight:800}
#token-card .tcnum{font-variant-numeric:tabular-nums;color:#f0f6fc;font-size:10px;font-weight:900;text-align:right;white-space:nowrap}
#token-card .tcswatch{width:7px;height:7px;border-radius:2px;background:var(--c,#58a6ff);display:inline-block;margin-right:5px;vertical-align:1px}
#token-card .tcmeta{color:#7f92aa;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.monitor-occluder{position:absolute;width:5.2%;height:4.6%;transform:translate(-50%,-100%) rotateZ(-11.8deg) skewX(-4.4deg) perspective(160px) rotateY(-5deg);transform-origin:78% 80%;filter:drop-shadow(0 4px 4px rgba(0,0,0,.35))}
.monitor-occluder:before{content:"";position:absolute;left:12%;top:0;width:76%;height:66%;border-radius:2px;background:linear-gradient(180deg,#1b2432,#0a0f18 72%,#05070c);border:1px solid rgba(70,88,115,.85);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),inset 0 -5px 8px rgba(0,0,0,.45)}
.monitor-occluder:after{content:"";position:absolute;left:42%;top:64%;width:18%;height:28%;background:linear-gradient(180deg,#202838,#0c111a);border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(0,0,0,.4)}
.monitor-occluder .monitor-base{position:absolute;left:27%;top:84%;width:48%;height:13%;border-radius:50%;background:rgba(8,12,18,.88);border:1px solid rgba(255,255,255,.08)}
.oa{position:absolute;transform:translate(-50%,-100%) scale(.42);transform-origin:50% 100%;display:flex;flex-direction:column;align-items:center;gap:3px;filter:drop-shadow(0 7px 9px rgba(0,0,0,.45));transition:left .9s cubic-bezier(.2,.8,.25,1),top .9s cubic-bezier(.2,.8,.25,1)}
.oa.focus{filter:drop-shadow(0 0 12px rgba(88,166,255,.9)) drop-shadow(0 7px 9px rgba(0,0,0,.45))}
.oa.focus .oatag{border-color:rgba(88,166,255,.85);box-shadow:0 0 0 2px rgba(88,166,255,.18)}
.oatag{display:flex;align-items:center;gap:5px;background:rgba(11,18,36,.82);border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:8px;padding:3px 7px;font-size:10px;font-weight:800;white-space:nowrap;transform:translateY(-1px)}
.oadot{width:7px;height:7px;border-radius:50%;background:#8b949e;box-shadow:0 0 0 2px rgba(255,255,255,.08)}
.oadot.working{background:#4ade80;box-shadow:0 0 0 4px rgba(74,222,128,.16)}
.oadot.blocked{background:#f87171;box-shadow:0 0 0 4px rgba(248,113,113,.18)}
.oadot.done{background:#22d3ee}
.oachar{width:128px;height:171px;position:relative;transform-origin:50% 100%;background-image:url('assets/employee-sprites-transparent.png');background-size:768px 512px;background-position:0 0;background-repeat:no-repeat;scale:-1 1}
.oachar:after{content:"";position:absolute;left:45px;top:122px;width:42px;height:8px;border-radius:6px;background:rgba(17,24,39,.55);border:1px solid rgba(255,255,255,.12);opacity:0;z-index:7}
.oa.pm .oachar{background-position:0 0}.oa.designer .oachar{background-position:-256px 0}.oa.frontend .oachar{background-position:-640px -171px}.oa.backend .oachar{background-position:-128px -171px}.oa.qa .oachar{background-position:-256px -171px}.oa.techlead .oachar{background-position:-512px -171px}
.oa.meeting.pm .oachar{background-position:-128px 0}.oa.meeting.designer .oachar{background-position:-384px 0}.oa.meeting.frontend .oachar{background-position:-512px 0}.oa.meeting.backend .oachar{background-position:0 -171px}.oa.meeting.qa .oachar{background-position:-256px -171px}.oa.meeting.techlead .oachar{background-position:-640px -171px}
.oa.meeting.frontend .oachar{clip-path:inset(0 0 58px 0)}
.oa.meeting.backend .oachar,.oa.meeting.qa .oachar{clip-path:inset(0 0 70px 0)}
.oachar>.oashadow,.oachar>.oaleg,.oachar>.oaarm,.oachar>.oabody,.oachar>.oaneck,.oachar>.oahead,.oachar>.oahair,.oachar>.oabadge{display:none}
.oashadow{position:absolute;left:8px;bottom:0;width:34px;height:9px;border-radius:50%;background:rgba(0,0,0,.3)}
.oaleg{position:absolute;top:39px;width:7px;height:12px;background:var(--pants,#26324f);border:2px solid #182033;border-radius:6px;transform-origin:50% 0;z-index:1}
.oaleg.l{left:15px;transform:rotate(14deg)}.oaleg.r{right:15px;transform:rotate(-14deg)}
.oashoe{position:absolute;bottom:-3px;width:11px;height:5px;background:var(--shoes,#151a2d);border-radius:6px;border:1px solid rgba(0,0,0,.35)}
.oaleg.l .oashoe{left:-5px}.oaleg.r .oashoe{right:-5px}
.oabody{position:absolute;left:11px;top:28px;width:28px;height:19px;background:linear-gradient(145deg,rgba(255,255,255,.24),transparent 42%),var(--agent,#6bc);border:2px solid #182033;border-radius:12px 12px 9px 9px;z-index:3}
.oaneck{position:absolute;left:20px;top:25px;width:10px;height:8px;background:var(--skin,#f1c27d);border-left:2px solid #182033;border-right:2px solid #182033;z-index:4}
.oaarm{position:absolute;top:31px;width:8px;height:17px;background:var(--agent,#6bc);border:2px solid #182033;border-radius:8px;transform-origin:50% 2px;z-index:2}
.oaarm.l{left:8px;transform:rotate(42deg)}.oaarm.r{right:8px;transform:rotate(-42deg)}
.oahand{position:absolute;left:0;right:0;bottom:-5px;margin:auto;width:7px;height:7px;border-radius:50%;background:var(--skin,#f1c27d);border:1px solid #182033}
.oahead{position:absolute;left:10px;top:3px;width:30px;height:30px;border-radius:14px 14px 15px 15px;background:radial-gradient(circle at 35% 32%,rgba(255,255,255,.32),transparent 20%),var(--skin,#f1c27d);border:2px solid #182033;z-index:6;overflow:hidden}
.oahair{position:absolute;left:7px;top:0;width:36px;height:21px;border-radius:18px 18px 7px 7px;background:var(--hair,#2b1f1a);border:2px solid #182033;z-index:7}
.oahair:before{content:"";position:absolute;left:5px;bottom:-5px;width:7px;height:9px;border-radius:0 0 7px 7px;background:var(--hair,#2b1f1a);box-shadow:9px 1px 0 var(--hair,#2b1f1a),18px 0 0 var(--hair,#2b1f1a)}
.oahair:after{content:"";position:absolute;right:-5px;top:10px;width:9px;height:14px;border-radius:9px;background:var(--hair,#2b1f1a);display:var(--tail,none)}
.oaeye{position:absolute;top:13px;width:4px;height:6px;background:#172033;border-radius:50%;z-index:8}.oaeye.l{left:8px}.oaeye.r{right:8px}
.oamouth{position:absolute;left:13px;top:22px;width:6px;height:2px;border-radius:4px;background:rgba(50,35,35,.5);z-index:8}
.oabadge{position:absolute;right:7px;top:32px;width:8px;height:8px;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.25);z-index:5}
.oa.working .oachar{animation:workBob .7s infinite alternate}.oa.blocked .oachar{animation:blockWobble .35s infinite alternate}.oa.walking .oachar{animation:walkBob .45s infinite}
.oa.working .oachar:after{opacity:1}.oa.working .oaarm.l{animation:typeL .45s infinite alternate}.oa.working .oaarm.r{animation:typeR .45s infinite alternate}
.oa.walking .oaleg.l{animation:legL .45s infinite}.oa.walking .oaleg.r{animation:legR .45s infinite}.oa.walking .oaarm.l{animation:armL .45s infinite}.oa.walking .oaarm.r{animation:armR .45s infinite}
@keyframes workBob{to{transform:translateY(2px)}}@keyframes blockWobble{to{transform:translateX(2px) rotate(-2deg)}}@keyframes walkBob{50%{transform:translateY(3px)}}@keyframes legL{50%{transform:rotate(18deg)}}@keyframes legR{50%{transform:rotate(-18deg)}}@keyframes armL{50%{transform:rotate(-18deg)}}@keyframes armR{50%{transform:rotate(18deg)}}@keyframes typeL{to{transform:rotate(28deg) translateY(2px)}}@keyframes typeR{to{transform:rotate(-28deg) translateY(2px)}}

/* Sidebar */
#sb{position:fixed;right:0;top:56px;bottom:0;width:310px;background:linear-gradient(180deg,#101936,#0f0f1e);border-left:1px solid rgba(255,255,255,.07);z-index:50;overflow-y:auto;transition:transform .3s}
#sb.hide{transform:translateX(310px);pointer-events:none}
#sb::-webkit-scrollbar{width:4px}
#sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
#tog{position:fixed;right:310px;top:62px;z-index:200;background:#0f0f1e;border:1px solid rgba(255,255,255,.1);border-right:none;color:#aaa;width:22px;height:28px;cursor:pointer;border-radius:6px 0 0 6px;font-size:11px;display:flex;align-items:center;justify-content:center;transition:right .3s}
#tog.off{right:0}
.sbh{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.05)}
.sbt{font-size:10px;color:#7a8ca0;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;flex:1}
#sf{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#ccc;font-size:11px;padding:3px 8px;border-radius:7px;cursor:pointer;outline:none}

/* Agent cards */
.ac{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s}
.ac:hover{background:rgba(255,255,255,.04)}
.ac.sel{background:rgba(30,136,229,.09);box-shadow:inset 3px 0 0 #64b5f6}
.ac.blk{background:rgba(229,57,53,.06)}
.ach{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.acav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.acn{font-size:13px;color:#f0f0f0;font-weight:700}
.acr{font-size:10px;color:#8fa8c0;margin-top:1px}
.actm{font-size:10px;color:#7a9ab8;margin-left:auto;white-space:nowrap}
.acsr{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bw{background:#1565c0}.bi{background:#2e7d32}.bb{background:#b71c1c}.bd{background:#00695c}.bo{background:#444}
.sw{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,152,0,.15);border:1px solid rgba(255,152,0,.3);color:#ffc857}
.sc{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.3);color:#ff8a80}
.acobj{font-size:11px;color:#c8d8e8;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.blbox{font-size:11px;color:#ffd0cc;line-height:1.4;margin-top:6px;padding:7px 8px;border-radius:8px;background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.2)}

/* Detail */
#det{margin:8px 12px 14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.03);overflow:hidden;padding:14px}
.dempty{padding:12px;color:#7f95ad;font-size:12px;line-height:1.4}

/* Work modal */
#wm{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);justify-content:center;align-items:center;padding:16px}
#wm.open{display:flex}

<script>
/* ══════════════════════════════════════════════════════
   ISOMETRIC PIXEL-ART OFFICE ENGINE
   ══════════════════════════════════════════════════════ */
const C=document.getElementById('game'),X=C.getContext('2d');
const MC=document.getElementById('mm'),MX=MC.getContext('2d');
const MINIMAP_W=240,MINIMAP_H=100;
const TILE=46;
const OFFICE_SIGN_NAME='Pinto Valley';
let W,H,cam={x:0,y:0,z:1.5};
let drag={on:false,sx:0,sy:0,cx:0,cy:0};
let agents={},ROOMS=[],HOMES={},ACOL={},CLOTH={};
let kanbanData=[],evidenceData=[],activityData={activities:[],workflows:[]};
let tokenData={agents:[],models:[],totals:{totalTokens:0}},selectedTokenModel='';
let selectedId='',cView='k';
let stageAgents={};
let occluders={};
let meetingSim=false,manualMeeting=null;
let agentFileManifest=null;
let stageFocus={mode:'overview',id:''};
const REQUIRED_WORK_AGENT_IDS=['pm','designer','frontend','backend','qa','techlead'];
document.getElementById('office-sign').textContent=OFFICE_SIGN_NAME;

// Isometric helpers
function isoX(gx,gy){return(gx-gy)*TILE}
function isoY(gx,gy){return(gx+gy)*TILE/2}
function scrX(gx,gy){return isoX(gx,gy)}
function scrY(gx,gy){return isoY(gx,gy)}

// Camera
C.addEventListener('mousedown',e=>{drag.on=true;drag.sx=e.clientX;drag.sy=e.clientY;drag.cx=cam.x;drag.cy=cam.y});
C.addEventListener('mousemove',e=>{if(!drag.on)return;cam.x=drag.cx-(e.clientX-drag.sx)/cam.z;cam.y=drag.cy-(e.clientY-drag.sy)/cam.z});
C.addEventListener('mouseup',()=>drag.on=false);
C.addEventListener('mouseleave',()=>drag.on=false);
C.addEventListener('wheel',e=>{cam.z=Math.max(.8,Math.min(3,cam.z-e.deltaY*.001));e.preventDefault()},{passive:false});

// Status
function norm(s){s=(s||'').toLowerCase().trim();if(s.includes('block'))return'blocked';if(s.includes('done')||s.includes('complete')||s.includes('approved')||s.includes('pass'))return'done';if(s.includes('work')||s.includes('doing')||s.includes('progress')||s.includes('active'))return'working';if(s.includes('offline'))return'offline';return'idle'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escA(s){return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function parseTs(v){if(!v||v==='recently'||v==='never')return null;const s=String(v).trim();const n=/^\d{4}-\d{2}-\d{2}T/.test(s)&&!/(Z|[+-]\d{2}:?\d{2})$/.test(s)?s+'Z':s;const t=new Date(n);return isNaN(t)?null:t}
function minsAgo(v){const t=parseTs(v);return t?(Date.now()-t)/60000:null}
function fmtAge(m){if(m==null)return'';if(m<1)return'now';if(m<60)return Math.round(m)+'m';if(m<1440)return Math.round(m/60)+'h';return Math.round(m/1440)+'d'}
function fmtDT(v){const t=parseTs(v);return t?t.toLocaleString('th-TH',{timeZone:'Asia/Bangkok',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:false}):''}
function staleOf(a){if(a.stale&&a.stale.level&&a.stale.level!=='fresh')return a.stale.level==='critical'?'critical':'warn';if(norm(a.status)!=='working')return null;const m=minsAgo(a.updatedAt);if(m==null)return null;if(m>30)return'critical';if(m>10)return'warn';return null}
function blocker(a){const b=a.blocker||{};const is=!!(b.isBlocked||norm(a.status)==='blocked'||a.activeBlocker);return{is,owner:b.owner||a.blockerOwner||'',missing:b.missingInput||b.missing||a.activeBlocker||'',next:b.nextAction||a.nextAction||''}}
function cardFromAgent(a){
  return{
    id:a.id,
    workItem:'none',
    title:a.objective||a.nextAction||'Waiting for next task',
    owner:a.name||a.id,
    ownerId:a.id,
    emoji:a.emoji||'🤖',
    color:a.color||'#999',
    status:norm(a.status),
    stage:norm(a.status)==='working'?'doing':norm(a.status)==='blocked'?'blocked':norm(a.status)==='done'?'done':'todo',
    plan:'',
    nextAction:a.nextAction||'',
    lastOutput:a.lastOutput||'',
    blocker:blocker(a),
    stale:a.stale||{level:'fresh',ageMinutes:null,reason:''},
    evidenceLinks:[{label:'Status',href:`data/artifacts/${a.id}/STATUS.md`}],
    collaboration:'',
    details:{deliverables:[],blockers:[],acceptanceCriteria:[],ownerNotes:[]},
    role:a.role||'',
    updatedAt:a.updatedAt||'',
    ageMinutes:a.stale&&a.stale.ageMinutes,
    screenshots:[],
    videos:[],
    pmTasks:null,
    warnings:[],
    escalation:null,
    requiredAction:''
  };
}
function ensureRosterCards(cards){
  const rows=(cards||[]).filter(Boolean);
  const byId=new Map(rows.map(c=>[c.ownerId||c.id,c]));
  for(const id of REQUIRED_WORK_AGENT_IDS){
    if(byId.has(id))continue;
    const agent=(_ad||[]).find(a=>a.id===id);
    if(agent){
      const fallback=cardFromAgent(agent);
      rows.push(fallback);
      byId.set(id,fallback);
    }
  }
  return rows;
}
function workScore(c){
  const n=norm(c&&c.status);
  if(blocker(c||{}).is||n==='blocked')return 25;
  if(n==='working')return 50;
  if(n==='done')return 100;
  return 100;
}
function meetingTopicText(v){
  let s=(v||'Current work').replace(/\s+/g,' ').trim();
  s=s.replace(/^\d{8}T\d{6}Z[-\w]*:\s*/,'');
  if(/paper-mode deployment verification/i.test(s)&&/github actions/i.test(s))return'Paper-mode deploy verification via GitHub Actions';
  s=s.replace(/^Take ownership of the\s+/i,'');
  s=s.replace(/\s+through the existing GitHub Actions pipeline\.?.*$/i,' via GitHub Actions');
  s=s.replace(/\s+The release is already approved.*$/i,'');
  return s.length>72?s.slice(0,69).trim()+'...':s;
}
function currentWorkSummary(){
  const cards=(kanbanData||[]).filter(Boolean);
  const active=cards.filter(c=>['working','blocked'].includes(norm(c.status))||blocker(c).is)
    .sort((a,b)=>(parseTs(b.updatedAt)?.getTime()||0)-(parseTs(a.updatedAt)?.getTime()||0));
  if(!active.length){
    const recent=cards.slice().sort((a,b)=>(parseTs(b.updatedAt)?.getTime()||0)-(parseTs(a.updatedAt)?.getTime()||0));
    const verified=recent.find(c=>/github actions|deployment verification|deploy/i.test([c.title,c.nextAction,c.lastOutput].join(' ')))||recent[0];
    return{pct:100,topic:meetingTopicText(verified&&(verified.title||verified.nextAction||verified.lastOutput)||'Ready for next scope')};
  }
  const primary=active.find(c=>(c.ownerId||c.id)!=='pm')||active[0];
  const pct=Math.max(0,Math.min(100,Math.round(active.reduce((sum,c)=>sum+workScore(c),0)/active.length)));
  const topic=meetingTopicText(primary.title||primary.nextAction||primary.lastOutput);
  return{pct,topic};
}
function renderMeetingStatus(){
  const el=document.getElementById('meeting-status-board');if(!el)return;
  const s=currentWorkSummary();
  const pct=el.querySelector('.msbpct'),bar=el.querySelector('.msbbar'),topic=el.querySelector('.msbtopic');
  if(pct)pct.textContent=s.pct+'%';
  if(bar)bar.style.width=s.pct+'%';
  if(topic)topic.textContent=s.topic;
}
function hasTalk(a){
  const vals=[a.speech,a.thought,a.message,a.lastMessage,a.currentMessage].map(v=>(v||'').toString().trim().toLowerCase());
  return vals.some(v=>v&&v!=='n/a'&&v!=='none'&&v!=='not online yet'&&v!=='waiting for next task');
}
function hasConversation(list,acd){
  // Only auto-meeting if an agent explicitly has location='meeting'
  if((list||[]).some(a=>a.location==='meeting'))return true;
  return false;
}
function shortWork(a){
  const n=norm(a.status);
  const sig={working:'⚡',blocked:'!',done:'✓',offline:'○',idle:'●'}[n]||'●';
  const raw=[a.speech,a.thought,a.nextAction,a.objective,a.lastOutput].map(v=>(v||'').toString().trim()).find(v=>v&&v!=='N/A'&&v!=='No status'&&v!=='not online yet'&&v!=='Waiting for next task');
  const fallback={working:'กำลังทำงาน',blocked:'ติด blocker',done:'เสร็จแล้ว',offline:'offline',idle:'standby'}[n]||'standby';
  const txt=(raw||fallback).replace(/\s+/g,' ').slice(0,48);
  return{sig,txt,n};
}

// ── MAP ──
let MAP=[];
function buildMap(rooms){
  let mx=0,my=0;
  rooms.forEach(r=>{mx=Math.max(mx,r.x+r.w);my=Math.max(my,r.y+r.h)});
  const MC2=Math.max(20,mx+2),MR=Math.max(15,my+2);
  MAP=[];
  for(let y=0;y<MR;y++){MAP[y]=[];for(let x=0;x<MC2;x++)MAP[y][x]=(y===0||y===MR-1||x===0||x===MC2-1)?1:0}
  rooms.forEach(r=>{
    for(let x=r.x;x<r.x+r.w;x++)if(r.y>0&&r.y<MR-1)MAP[r.y][x]=1;
    if(r.y>0)MAP[r.y][r.x+Math.floor(r.w/2)]=0;
    for(let y=r.y;y<r.y+r.h;y++)if(r.x>0&&r.x<MC2-1){MAP[y][r.x]=1}
    if(r.x>0)MAP[r.y+Math.floor(r.h/2)][r.x]=0;
    // Furniture
    if(r.type==='meeting'){
      for(let dx=1;dx<r.w-1;dx++){if(r.y+2<MR)MAP[r.y+2][r.x+dx]=4;if(r.y+3<MR)MAP[r.y+3][r.x+dx]=4}
    }else if(r.type==='lounge'){
      if(r.y+1<MR&&r.x+1<MC2)MAP[r.y+1][r.x+1]=5;
      if(r.y+2<MR&&r.x+3<MC2)MAP[r.y+2][r.x+3]=5;
    }else{
      for(let dx=1;dx<r.w-1;dx+=2){
        if(r.y+1<MR&&r.x+dx<MC2)MAP[r.y+1][r.x+dx]=2; // desk
        if(r.y+2<MR&&r.x+dx<MC2)MAP[r.y+2][r.x+dx]=3; // chair
      }
    }
  });
  sizeMinimap();
}

function sizeMinimap(){
  if(!MC)return;
  const dpr=Math.max(1,window.devicePixelRatio||1);
  const w=MINIMAP_W*dpr,h=MINIMAP_H*dpr;
  if(MC.width!==w)MC.width=w;
  if(MC.height!==h)MC.height=h;
  MC.style.width=MINIMAP_W+'px';
  MC.style.height=MINIMAP_H+'px';
}

// ── ISOMETRIC DRAW ──
function drawFloor(t){
  const rows=MAP.length,cols=MAP[0]?MAP[0].length:0;
  drawCampusBase(cols,rows,t);
  // Draw back-to-front (painter's algorithm)
  for(let gy=0;gy<rows;gy++)for(let gx=0;gx<cols;gx++){
    const v=MAP[gy][gx];
    const sx=scrX(gx,gy),sy=scrY(gx,gy);
    const tw=TILE,th=TILE/2;

    if(v===1){
      // Wall — isometric block with height
      drawWall(sx,sy,tw,th);
    }else{
      // Floor tile
      drawFloorTile(sx,sy,tw,th,(gx+gy)%2===0);
      // Furniture
      if(v===2)drawDesk(sx,sy,tw,th);
      if(v===3)drawChair(sx,sy,tw,th);
      if(v===4)drawTable(sx,sy,tw,th);
      if(v===5)drawPlant(sx,sy,tw,th,t,gx);
    }
  }
}

function drawCampusBase(cols,rows,t){
  const corners=[
    [scrX(0,0),scrY(0,0)],
    [scrX(cols-1,0),scrY(cols-1,0)],
    [scrX(cols-1,rows-1),scrY(cols-1,rows-1)],
    [scrX(0,rows-1),scrY(0,rows-1)]
  ];
  X.fillStyle='#20345e';
  X.beginPath();
  corners.forEach((p,i)=>i?X.lineTo(p[0],p[1]+34):X.moveTo(p[0],p[1]+34));
  X.closePath();X.fill();
  X.fillStyle='#253f70';
  X.beginPath();
  corners.forEach((p,i)=>i?X.lineTo(p[0],p[1]):X.moveTo(p[0],p[1]));
  X.closePath();X.fill();
  for(let i=0;i<7;i++){
    const x=-rows*TILE*.35+i*cols*TILE/6;
    X.fillStyle=i%2?'rgba(255,255,255,.07)':'rgba(255,255,255,.035)';
    X.beginPath();X.arc(x,-70+Math.sin(t*.0006+i)*8,22+i%3*5,0,Math.PI*2);X.fill();
  }
}

function drawFloorTile(sx,sy,w,h,even){
  X.fillStyle=even?'#3a3a4e':'#353548';
  X.beginPath();
  X.moveTo(sx,sy);X.lineTo(sx+w/2,sy+h/2);X.lineTo(sx,sy+h);X.lineTo(sx-w/2,sy+h/2);X.closePath();
  X.fill();
  X.strokeStyle='rgba(255,255,255,.03)';X.lineWidth=.5;X.stroke();
}

function drawWall(sx,sy,w,h){
  const wallH=28;
  // Left face
  X.fillStyle='#252540';
  X.beginPath();
  X.moveTo(sx-w/2,sy+h/2);X.lineTo(sx,sy+h);X.lineTo(sx,sy+h-wallH);X.lineTo(sx-w/2,sy+h/2-wallH);X.closePath();
  X.fill();
  // Right face
  X.fillStyle='#2d2d50';
  X.beginPath();
  X.moveTo(sx,sy+h);X.lineTo(sx+w/2,sy+h/2);X.lineTo(sx+w/2,sy+h/2-wallH);X.lineTo(sx,sy+h-wallH);X.closePath();
  X.fill();
  // Top face
  X.fillStyle='#383860';
  X.beginPath();
  X.moveTo(sx,sy);X.lineTo(sx+w/2,sy+h/2-wallH);X.lineTo(sx,sy+h-wallH);X.lineTo(sx-w/2,sy+h/2-wallH);X.closePath();
  X.fill();
  // Highlight
  X.fillStyle='rgba(255,255,255,.06)';
  X.fillRect(sx-w/2+1,sy+h/2-wallH,w-2,2);
}

function drawDesk(sx,sy,w,h){
  const dw=w*.6,dh=h*.5,dH=8;
  const cx=sx,cy=sy+h*.3;
  // Desk top
  X.fillStyle='#c9955c';
  X.beginPath();
  X.moveTo(cx,cy-dh/2);X.lineTo(cx+dw/2,cy);X.lineTo(cx,cy+dh/2);X.lineTo(cx-dw/2,cy);X.closePath();
  X.fill();
  // Desk front face
  X.fillStyle='#a07840';
  X.beginPath();
  X.moveTo(cx-dw/2,cy);X.lineTo(cx,cy+dh/2);X.lineTo(cx,cy+dh/2+dH);X.lineTo(cx-dw/2,cy+dH);X.closePath();
  X.fill();
  // Monitor
  X.fillStyle='#111';
  const mw=8,mh=6;
  X.fillRect(cx-mw/2,cy-dh/2-mh-2,mw,mh);
  X.fillStyle='rgba(80,160,255,.4)';X.fillRect(cx-mw/2+1,cy-dh/2-mh-1,mw-2,mh-2);
  // Stand
  X.fillStyle='#888';X.fillRect(cx-1,cy-dh/2-2,2,3);
}

function drawChair(sx,sy,w,h){
  const cx=sx,cy=sy+h*.4;
  // Seat
  X.fillStyle='#444';
  X.beginPath();
  X.ellipse(cx,cy,6,4,0,0,Math.PI*2);X.fill();
  // Back
  X.fillStyle='#333';
  X.beginPath();
  X.ellipse(cx,cy-7,7,5,0,Math.PI,Math.PI*2);X.fill();
}

function drawTable(sx,sy,w,h){
  const cx=sx,cy=sy+h*.3;
  X.fillStyle='#b08050';
  X.beginPath();
  X.ellipse(cx,cy,10,7,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,.15)';
  X.beginPath();X.ellipse(cx-3,cy-2,4,2,-.3,0,Math.PI*2);X.fill();
}

function drawPlant(sx,sy,w,h,t,seed){
  const cx=sx,cy=sy+h*.2;
  const sw=Math.sin(t*.002+seed)*.5;
  // Pot
  X.fillStyle='#c07848';
  X.beginPath();X.moveTo(cx-4,cy);X.lineTo(cx+4,cy);X.lineTo(cx+3,cy+5);X.lineTo(cx-3,cy+5);X.closePath();X.fill();
  // Foliage
  X.fillStyle='#2a7024';X.beginPath();X.arc(cx+sw,cy-4,6,0,Math.PI*2);X.fill();
  X.fillStyle='#3d9434';X.beginPath();X.arc(cx-1+sw,cy-6,4,0,Math.PI*2);X.fill();
  X.fillStyle='#5ab84e';X.beginPath();X.arc(cx-2+sw,cy-7,2.5,0,Math.PI*2);X.fill();
}

// ── DRAW CHARACTER ──
function drawChar(a,t){
  const col=ACOL[a.id]||{main:'#999',dark:'#777'};
  const cl=CLOTH[a.id]||{hair:'#3a2a1a',skin:'#F5D0A9',shirt:col.main,pants:'#3a3a5a',shoes:'#2a2a3a',hs:'short'};
  const gx=a._cx,gy=a._cy;
  const sx=scrX(gx,gy),sy=scrY(gx,gy);
  const n=norm(a.status);
  const walk=a._walking;
  const stale=staleOf(a);

  let bob=0,leg=0,arm=0;
  if(walk){bob=Math.sin(t*.015)*1.5;leg=Math.sin(t*.015)*5;arm=Math.sin(t*.015)*3}
  else if(n==='idle'){bob=Math.sin(t*.003)*1}
  else if(n==='working'){bob=Math.sin(t*.01)*.5;arm=Math.sin(t*.008)*2}
  else if(n==='blocked'){bob=Math.sin(t*.02)*2}

  if(stale)X.save(),X.globalAlpha=stale==='critical'?.35:.6;

  const by=sy+bob-20;
  const f=a._facing||1;

  // Shadow
  X.fillStyle='rgba(0,0,0,.2)';X.beginPath();X.ellipse(sx,sy-8,10,4,0,0,Math.PI*2);X.fill();

  // Legs
  X.strokeStyle=cl.pants;X.lineWidth=4;X.lineCap='round';
  X.beginPath();X.moveTo(sx-3,by+8);X.lineTo(sx-3+leg*.2,by+16);X.stroke();
  X.beginPath();X.moveTo(sx+3,by+8);X.lineTo(sx+3-leg*.2,by+16);X.stroke();
  // Shoes
  X.fillStyle=cl.shoes;
  X.beginPath();X.ellipse(sx-3+leg*.2,by+17,4,2,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(sx+3-leg*.2,by+17,4,2,0,0,Math.PI*2);X.fill();

  // Body
  X.fillStyle=cl.shirt;
  X.beginPath();X.ellipse(sx,by+2,8,7,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,.15)';X.beginPath();X.ellipse(sx-2,by-1,5,3,0,0,Math.PI*2);X.fill();

  // Arms
  X.strokeStyle=cl.shirt;X.lineWidth=4;X.lineCap='round';
  if(n==='working'){
    X.beginPath();X.moveTo(sx-8,by+1);X.lineTo(sx-10,by+6+arm);X.stroke();
    X.beginPath();X.moveTo(sx+8,by+1);X.lineTo(sx+10,by+6-arm);X.stroke();
  }else{
    X.beginPath();X.moveTo(sx-8,by+2);X.lineTo(sx-11,by+8+arm);X.stroke();
    X.beginPath();X.moveTo(sx+8,by+2);X.lineTo(sx+11,by+8-arm);X.stroke();
  }

  // Head
  X.fillStyle=cl.skin;X.beginPath();X.ellipse(sx,by-6,7,8,0,0,Math.PI*2);X.fill();
  // Hair
  X.fillStyle=cl.hair;
  const hs=cl.hs;
  if(hs==='short'){X.beginPath();X.ellipse(sx,by-9,7,6,0,Math.PI,Math.PI*2);X.fill();X.fillRect(sx-7,by-9,14,3)}
  else if(hs==='messy'){X.beginPath();X.ellipse(sx+1,by-9,8,7,0,Math.PI,Math.PI*2);X.fill();X.fillRect(sx-8,by-9,16,4);X.fillRect(sx-6,by-12,3,4);X.fillRect(sx+5,by-11,3,3)}
  else if(hs==='ponytail'){X.beginPath();X.ellipse(sx,by-9,8,6,0,Math.PI,Math.PI*2);X.fill();X.fillRect(sx-8,by-9,16,4);const ps=Math.sin(t*.004)*2*(walk?2:1);X.strokeStyle=cl.hair;X.lineWidth=3;X.lineCap='round';X.beginPath();X.moveTo(sx+7*f,by-8);X.quadraticCurveTo(sx+12*f+ps,by-4,sx+10*f+ps,by+2);X.stroke()}
  else if(hs==='bun'){X.beginPath();X.ellipse(sx,by-9,7,6,0,Math.PI,Math.PI*2);X.fill();X.fillRect(sx-7,by-9,14,4);X.beginPath();X.arc(sx,by-14,4,0,Math.PI*2);X.fill()}
  else{X.beginPath();X.ellipse(sx,by-9,7,6,0,Math.PI,Math.PI*2);X.fill();X.fillRect(sx-7,by-10,14,4)}

  // Eyes
  const ex=f*2,blink=Math.sin(t*.005+(a._blink||0))>.96;
  if(!blink){
    X.fillStyle='#fff';X.beginPath();X.ellipse(sx-2+ex,by-5,2,2.5,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(sx+4+ex,by-5,2,2.5,0,0,Math.PI*2);X.fill();
    X.fillStyle='#222';X.beginPath();X.arc(sx-1+ex+f,by-5,1.5,0,Math.PI*2);X.fill();X.beginPath();X.arc(sx+5+ex+f,by-5,1.5,0,Math.PI*2);X.fill();
  }else{X.strokeStyle='#222';X.lineWidth=1;X.beginPath();X.moveTo(sx-4+ex,by-5);X.lineTo(sx-0+ex,by-5);X.stroke();X.beginPath();X.moveTo(sx+2+ex,by-5);X.lineTo(sx+6+ex,by-5);X.stroke()}

  // Mouth
  if(n==='blocked'){X.strokeStyle='#f44';X.lineWidth=1;X.beginPath();X.arc(sx+1+ex,by-1,3,0,Math.PI);X.stroke()}
  else if(n==='working'){X.fillStyle='rgba(255,255,255,.3)';X.fillRect(sx-1+ex,by-1,3,1)}
  else{X.strokeStyle='rgba(255,255,255,.3)';X.lineWidth=1;X.beginPath();X.arc(sx+1+ex,by-1,2,Math.PI,0);X.stroke()}

  // Name tag
  X.font='bold 9px system-ui,sans-serif';
  const nm=a.name||a.id,nw=X.measureText(nm).width;
  X.fillStyle='rgba(0,0,0,.5)';
  X.beginPath();X.roundRect(sx-nw/2-5,by-22,nw+10,12,5);X.fill();
  X.fillStyle=col.main;X.fillRect(sx-nw/2-5,by-22,3,12);
  X.fillStyle='#fff';X.textAlign='center';X.fillText(nm,sx,by-13);X.textAlign='left';

  // Status indicator dot
  const dotX=sx+nw/2+3,dotY=by-16;
  X.fillStyle=n==='working'?'#4CAF50':n==='blocked'?'#f44':n==='done'?'#00BCD4':'#888';
  X.beginPath();X.arc(dotX,dotY,3,0,Math.PI*2);X.fill();
  if(n==='working'){X.fillStyle='rgba(76,175,80,.3)';X.beginPath();X.arc(dotX,dotY,5+Math.sin(t*.005)*2,0,Math.PI*2);X.fill()}

  // Speech bubble
  if(a.objective&&a.objective!=='Waiting for next task'){
    const txt=a.objective.length>35?a.objective.substring(0,33)+'…':a.objective;
    X.font='8px system-ui,sans-serif';
    const bw=X.measureText(txt).width+14;
    const bx=sx-bw/2,bby=by-38;
    X.fillStyle=n==='blocked'?'#fff0f0':'#fff';
    X.beginPath();X.roundRect(bx,bby,bw,14,6);X.fill();
    X.fillStyle=n==='blocked'?'rgba(200,0,0,.6)':'rgba(0,0,0,.7)';
    X.textAlign='center';X.fillText(txt,sx,bby+10);X.textAlign='left';
    // Arrow
    X.fillStyle=n==='blocked'?'#fff0f0':'#fff';
    X.beginPath();X.moveTo(sx-3,bby+14);X.lineTo(sx+3,bby+14);X.lineTo(sx,bby+18);X.closePath();X.fill();
  }

  if(stale)X.restore();
}

// ── ROOM LABELS (isometric) ──
function drawRoomLabels(){
  ROOMS.forEach(r=>{
    const cx=(r.x+r.w/2),cy=r.y+.3;
    const sx=scrX(cx,cy),sy=scrY(cx,cy);
    X.font='bold 9px system-ui,sans-serif';

function getTarget(id,loc){
  const ids=Object.keys(HOMES),idx=Math.max(0,ids.indexOf(id));
  if(loc==='meeting'){const mr=ROOMS.find(r=>r.type==='meeting');if(mr)return{x:mr.x+mr.w/2,y:mr.y+mr.h/2}}

function updateAgents(){
  Object.values(agents).forEach(a=>{
    if(a._tx==null){a._tx=a._cx;a._ty=a._cy}
    const dx=a._tx-a._cx,dy=a._ty-a._cy,d=Math.sqrt(dx*dx+dy*dy);
    if(d>.02){a._cx+=dx*.03;a._cy+=dy*.03;a._walking=true}
    else{a._cx=a._tx;a._cy=a._ty;a._walking=false}
  });
}

  const age=Math.max(0,Math.floor((Date.now()-dt.getTime())/1000));

    updateDataFreshness(ad.meta||{});
    const list=(ad.agents||ad).map(a=>({...a,status:norm(a.status)}));

    list.forEach(d=>{

      else{const prev=agents[d.id].status,pL=agents[d.id].location;agents[d.id]={...agents[d.id],...d};if(prev!==d.status||pL!==d.location){const tg=getTarget(d.id,d.location);agents[d.id]._tx=tg.x;agents[d.id]._ty=tg.y}}
    });
    _ad=list;kanbanData=ensureRosterCards((kd.cards||kd).map(c=>({...c,blocker:blocker(c)})));evidenceData=ed.artifacts||ed||[];activityData={activities:acd.activities||[],workflows:acd.workflows||[]};

  }catch(e){document.getElementById('live').textContent='● RECONNECTING…';setDataBanner('error','Dashboard data fetch failed. Waiting for backend refresher.')}

}

}

function renderBoard(cards){
  const bv=document.getElementById('bv'),lv=document.getElementById('lv'),as=document.getElementById('as');
  bv.className='board';
  bv.hidden=false;lv.hidden=true;as.hidden=true;
  bv.style.display='';lv.style.display='';as.style.display='';
  const COLS={todo:[],doing:[],blocked:[],done:[]};
  const stageOf=c=>{
    if(blocker(c).is)return'blocked';
    const s=(c.stage||'').toLowerCase();
    if(s==='todo')return'todo';
    if(s==='backlog'||s==='new'||s==='pending')return'todo';
    if(s==='test'||s==='testing'||s==='qa'||s==='review')return'doing';
    if(COLS[s])return s;
    const n=norm(c.status);
    if(n==='idle')return'todo';
    if(n==='done')return'done';
    if(n==='blocked')return'blocked';
    if(n==='working')return'doing';
    return'todo';
  };
  cards.forEach(c=>COLS[stageOf(c)].push(c));
  const CFG={todo:{c:'#8b949e',l:'Todo'},doing:{c:'#58a6ff',l:'Doing'},blocked:{c:'#f85149',l:'Blocked'},done:{c:'#3fb950',l:'Done'}};
  bv.innerHTML=Object.entries(CFG).map(([k,cfg])=>{
    const col=COLS[k]||[];
    return`<div><div class="colh" style="border-color:${cfg.c}"><span style="width:8px;height:8px;border-radius:50%;background:${cfg.c}"></span><span class="colt">${cfg.l}</span><span class="colc" style="background:${cfg.c}22;color:${cfg.c}">${col.length}</span></div>${col.length?col.map(c=>ch(c)).join(''):'<div class="ecol">ไม่มี</div>'}</div>`}).join('');
}
function ch(c){
  const bl=c.blocker||blocker(c);const dt=fmtDT(c.updatedAt);const age=fmtAge(minsAgo(c.updatedAt));
  const ev=cardEvidence(c).slice(0,2);

    <div class="kctl">${esc((c.title||'').replace(/^[-\d.\s]+/,'').trim())}</div>
    <div class="kcmeta">${dt?`<span class="kcm">${age||dt}</span>`:''}${ev.length?`<span class="kcm">${ev.length} evidence</span>`:''}</div>
    ${bl.is?`<div class="kcblk">⏹ ${esc(bl.missing||'Needs follow-up')}</div>`:''}

}

}
function renderAS(){
  const el=document.getElementById('as');
  el.hidden=true;
  el.innerHTML='';

function evIcon(e){
  const p=(e.path||e.href||'').toLowerCase(),m=(e.mimeType||'').toLowerCase(),t=(e.artifactType||e.title||e.label||'').toLowerCase();
  if(/\.(png|jpg|jpeg|webp|gif|svg)$/.test(p)||m.startsWith('image/')||t.includes('image'))return'🖼️';
  if(/\.(webm|mp4|mov)$/.test(p)||m.startsWith('video/')||t.includes('video'))return'🎥';
  if(/\.(json)$/.test(p)||m.includes('json'))return'🧾';
  if(/\.(md|txt)$/.test(p)||m.includes('markdown')||t.includes('doc')||t.includes('status')||t.includes('report'))return'📄';
  return'🔗';
}
function shortEvTitle(e){
  const raw=(e.title||e.label||'Evidence').replace(/\.(md|txt|json|png|jpg|jpeg|webp|gif|svg|webm|mp4)$/i,'');
  return raw.length>18?raw.slice(0,17)+'…':raw;
}
function cardEvidence(c){
  const local=(evidenceData||[]).filter(e=>e.owner===c.ownerId||e.owner===c.id||e.workItem===c.workItem||e.cardId===c.id);
  const links=(c.evidenceLinks||[]).map(e=>({title:e.label||'Evidence',label:e.label||'Evidence',path:e.href||e.path||'',mimeType:e.mimeType||''}));
  const seen=new Set();
  return local.concat(links).filter(e=>{
    if((e.artifactType||'').toLowerCase()==='status'||(e.title||e.label||'').toLowerCase()==='status')return false;
    const key=e.path||e.href||e.id||e.title;
    if(!key||seen.has(key))return false;
    seen.add(key);
    return true;
  });
}
function evTime(e){return parseTs(e.updatedAt||e.createdAt||e.timestamp)?.getTime()||0}
function renderEvidenceTable(ev){
  const rows=ev.slice().sort((a,b)=>evTime(b)-evTime(a));
  return`<table class="evtbl"><thead><tr><th>Time</th><th>Evidence</th></tr></thead><tbody>${rows.map(e=>{
    const title=e.title||e.label||'Evidence';
    return`<tr><td class="evtime">${fmtDT(e.updatedAt||e.createdAt||e.timestamp)||'—'}</td><td><button onclick="openArt('${esc(e.path||e.href||'')}','${esc(e.mimeType||'')}','${esc(title)}')">${esc(evIcon(e))} ${esc(title)}</button></td></tr>`;
  }).join('')}</tbody></table>`;
}
function openTD(id){
  const c=kanbanData.find(x=>x.id===id);if(!c)return;
  const bl=c.blocker||blocker(c);const dt=fmtDT(c.updatedAt);const age=fmtAge(minsAgo(c.updatedAt));

    <div style="font-size:12px;font-weight:700;color:#f0f6fc;margin-bottom:6px;line-height:1.3">${esc((c.title||'').replace(/^[-\d.\s]+/,'').trim())}</div>
    ${dt?`<div style="font-size:10px;color:#8b949e;margin-bottom:8px">${dt}${age?' · '+age:''}</div>`:''}
    ${c.nextAction?`<div style="margin-bottom:8px"><div style="font-size:9px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Next Action</div><div style="font-size:12px;color:#d2a8ff">${esc(c.nextAction)}</div></div>`:''}
    ${bl.is?`<div style="margin-bottom:8px"><div style="font-size:9px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Blocker</div><div style="padding:8px;border-radius:8px;background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.2);color:#ffa198;font-size:11px;line-height:1.4">⏹ ${esc(bl.missing||'Needs follow-up')}${bl.next?`<br>Next: ${esc(bl.next)}`:''}</div></div>`:''}
    ${ev.length?`<div style="margin-bottom:8px"><div style="font-size:9px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Evidence</div>${renderEvidenceTable(ev)}</div>`:''}
  `;
}

// ── VIEWERS ──
function openArt(p,m,t){const l=(p||'').toLowerCase();if(l.match(/\.(png|jpg|jpeg|webp|gif|svg)$/))return openI(p);if(l.match(/\.(md|json|txt)$/))return openDc(p,t);window.open(p,'_blank')}
function openI(s){document.getElementById('ivi').src=s;document.getElementById('iv').style.display='flex'}
function closeI(){document.getElementById('iv').style.display='none';document.getElementById('ivi').src=''}
function renderMarkdown(src){
  const lines=(src||'').replace(/\r\n/g,'\n').split('\n');
  let out='',inCode=false,code=[],inList=false;
  const closeList=()=>{if(inList){out+='</ul>';inList=false}};
  const isTableRow=s=>/^\|(.+\|)+\s*$/.test(s);
  const isTableSep=s=>/^\|\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(s);
  const cells=s=>s.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(x=>x.trim());
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const s=line.trim();
    if(s.startsWith('```')){
      if(inCode){out+=`<pre><code>${esc(code.join('\n'))}</code></pre>`;code=[];inCode=false}else{closeList();inCode=true}
      continue;
    }
    if(inCode){code.push(line);continue}
    if(!s){closeList();continue}
    if(isTableRow(s)&&i+1<lines.length&&isTableSep(lines[i+1].trim())){
      closeList();
      const head=cells(s);
      i+=2;
      const rows=[];
      while(i<lines.length&&isTableRow(lines[i].trim())){
        rows.push(cells(lines[i].trim()));
        i++;
      }
      i--;
      out+=`<table><thead><tr>${head.map(x=>`<th>${inlineMd(x)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${head.map((_,idx)=>`<td>${inlineMd(r[idx]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      continue;
    }
    const h=s.match(/^(#{1,3})\s+(.+)$/);
    if(h){closeList();out+=`<h${h[1].length}>${inlineMd(h[2])}</h${h[1].length}>`;continue}
    const li=s.match(/^[-*]\s+(.+)$/);
    if(li){if(!inList){out+='<ul>';inList=true}out+=`<li>${inlineMd(li[1])}</li>`;continue}
    if(s.startsWith('>')){closeList();out+=`<blockquote>${inlineMd(s.replace(/^>\s*/,''))}</blockquote>`;continue}
    closeList();out+=`<p>${inlineMd(s)}</p>`;
  }
  closeList();
  if(inCode)out+=`<pre><code>${esc(code.join('\n'))}</code></pre>`;
  return out||'<p>Empty document</p>';
}
function inlineMd(s){
  return esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>');
}
function openDc(p,t){
  document.getElementById('dvt').textContent=t||'Document';
  document.getElementById('dvd').innerHTML='Loading…';
  document.getElementById('dv').style.display='flex';
  fetch(p+'?t='+Date.now()).then(r=>r.text()).then(txt=>{
    const l=(p||'').toLowerCase();
    if(l.endsWith('.json'))try{txt=JSON.stringify(JSON.parse(txt),null,2)}catch(e){}
    document.getElementById('dvd').innerHTML=l.endsWith('.md')?renderMarkdown(txt):`<pre><code>${esc(txt)}</code></pre>`;
  }).catch(()=>{document.getElementById('dvd').innerHTML='ไม่พบไฟล์'});
}
function closeD(){document.getElementById('dv').style.display='none'}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeI();closeD();closeW();closeS()}});

let appVersion='';
async function checkAppVersion(){
  try{
    const r=await fetch('data/app-version.json?t='+Date.now());
    if(!r.ok)return;
    const v=await r.json();
    const next=String(v.version||'');
    if(!next)return;
    if(appVersion&&next!==appVersion)location.reload();
    appVersion=next;
  }catch(e){}
}
